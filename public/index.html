<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mastermind Medic's Solutions — Loading</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="loading.css">
</head>
<body>

<div class="loader-screen" id="loader-screen">
  <div class="pulse-wrap" aria-hidden="true">
    <span class="pulse-ring ring-1"></span>
    <span class="pulse-ring ring-2"></span>
    <span class="pulse-ring ring-3"></span>
    <span class="pulse-core">
      <img src="logo.png" alt="" class="pulse-logo">
    </span>
  </div>

  <h1 class="loader-name">Mastermind Medic's Solutions</h1>
  <p class="loader-tag">FOR MEDICS, BY MEDICS</p>

  <div class="loader-percent" role="status" aria-live="polite">
    <span id="percent-value">1</span>%
  </div>
  <div class="loader-track">
    <div class="loader-fill" id="loader-fill"></div>
  </div>
</div>

<script src="loading.js"></script>
</body>
</html>
